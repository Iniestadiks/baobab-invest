version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: baobab_postgres
    restart: always
    environment:
      POSTGRES_DB: baobab_db
      POSTGRES_USER: baobab_user
      POSTGRES_PASSWORD: BaobabSecure2025!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - baobab_network

  redis:
    image: redis:7-alpine
    container_name: baobab_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - baobab_network

volumes:
  pgdata:

networks:
  baobab_network:
    driver: bridge
